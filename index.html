<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sea Mystery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: url('textures/bg1.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Arial', sans-serif; 
        }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [gameStarted, setGameStarted] = useState(false);
            const [isDead, setIsDead] = useState(false);
            const [timer, setTimer] = useState(60);
            const [showRoster, setShowRoster] = useState(true);
            const [loading, setLoading] = useState(true);
            const [roster, setRoster] = useState([]);
            const [difficulty, setDifficulty] = useState('Orta');
            const [gameDuration, setGameDuration] = useState(60);
            const [gameOver, setGameOver] = useState(false);
            const [winner, setWinner] = useState('');
            
            const mountRef = useRef(null);
            const gameStateRef = useRef({
                scene: null, camera: null, renderer: null,
                player: null, bots: [], solidObjects: [],
                keys: {}, time: 0, botSpeed: 0.1
            });

            useEffect(() => {
                if (!gameStarted) return;

                const scene = new THREE.Scene();
                scene.fog = new THREE.Fog(0x1a3a5a, 60, 200); // Sis uzaklaştırıldı (Daha geniş alan için)

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.setClearColor(0x000000, 0); 
                mountRef.current.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x6080a0, 1.2); 
                scene.add(ambientLight);
                
                const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
                sunLight.position.set(20, 50, 20);
                sunLight.castShadow = true;
                scene.add(sunLight);

                const loader = new THREE.GLTFLoader();
                
                const fishModels = [
                    { path: 'models/Sinfish.glb', name: 'Sinfish' },
                    { path: 'models/Ninfish_3D.glb', name: 'Ninfish' },
                    { path: 'models/Pinkfish.glb', name: 'Pinkfish' },
                    { path: 'models/Bugsyfish.glb', name: 'Bugsyfish' },
                    { path: 'models/Rozyfish.glb', name: 'Rozyfish' },
                    { path: 'models/Elifish.glb', name: 'Elifish' },
                    { path: 'models/Mirfish_3D.glb', name: 'Mirfish' }
                ];

                // Objeler ve Odalar Büyütüldü (Scale 3 ve 6 yapıldı)
                const envSpawnList = [
                    { name: 'temple_room.glb', x: 0, z: 0, scale: 6, radius: 0 },
                    { name: 'ship_hull.glb', x: -40, z: 15, scale: 6, radius: 0 },
                    { name: 'coral_cave.glb', x: 40, z: 15, scale: 6, radius: 0 },
                    { name: 'submarine_section.glb', x: 0, z: -45, scale: 6, radius: 0 },
                    
                    { name: 'treasure_chest.glb', x: 5, z: 5, scale: 3, radius: 4 },
                    { name: 'treasure_chest.glb', x: -35, z: 20, scale: 3, radius: 4 },
                    { name: 'diving_mask.glb', x: -5, z: -5, scale: 2, radius: 2 },
                    { name: 'skeleton.glb', x: 35, z: 5, scale: 3, radius: 4 },
                    { name: 'giant_kelp.glb', x: 15, z: -25, scale: 4, radius: 2 },
                    { name: 'giant_kelp.glb', x: -15, z: -25, scale: 4, radius: 2 },
                    { name: 'coral_reef.glb', x: 50, z: -20, scale: 4, radius: 5 },
                    { name: 'coral_reef.glb', x: -50, z: -20, scale: 4, radius: 5 },
                    { name: 'coral_tube.glb', x: 25, z: 35, scale: 4, radius: 4 },
                    { name: 'coral_tube.glb', x: -25, z: 35, scale: 4, radius: 4 }
                ];

                let totalToLoad = fishModels.length + envSpawnList.length;
                let currentLoaded = 0;

                const onAssetLoad = () => {
                    currentLoaded++;
                    if (currentLoaded === totalToLoad) {
                        setLoading(false);
                        assignRoles();
                        startGameLoop();
                    }
                };

                const createFish = (model, isPlayer, fishName) => {
                    model.scale.set(3, 3, 3); // Balıklar büyütüldü
                    model.position.set((Math.random() - 0.5) * 20 + 20, 3, 30);
                    model.isDead = false; 
                    model.isPredator = false;
                    model.isProtector = false;
                    model.fishName = fishName;
                    
                    if (!isPlayer) {
                        model.direction = Math.random() * Math.PI * 2;
                        model.directionTimer = 0;
                    }
                    
                    model.traverse(child => { if (child.isMesh) { child.castShadow = true; } });
                    
                    if (isPlayer) gameStateRef.current.player = model;
                    else gameStateRef.current.bots.push(model);
                    scene.add(model);
                };

                fishModels.forEach((fishData, index) => {
                    loader.load(fishData.path, (gltf) => {
                        createFish(gltf.scene, index === 0, fishData.name);
                        onAssetLoad();
                    }, undefined, (err) => {
                        console.error("Balık modeli yüklenemedi:", fishData.path, err);
                        const boxGeo = new THREE.BoxGeometry(2, 1, 3);
                        const boxMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
                        createFish(new THREE.Mesh(boxGeo, boxMat), index === 0, fishData.name + " (Hata!)");
                        onAssetLoad();
                    });
                });

                envSpawnList.forEach(item => {
                    loader.load(`models/environment/${item.name}`, (gltf) => {
                        const model = gltf.scene;
                        model.position.set(item.x, 0, item.z);
                        model.scale.set(item.scale, item.scale, item.scale);
                        model.isFloor = false;
                        model.collisionRadius = item.radius;
                        model.traverse(child => { 
                            if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } 
                        });
                        scene.add(model);
                        gameStateRef.current.solidObjects.push(model);
                        onAssetLoad();
                    }, undefined, (err) => {
                        console.error("Ortam modeli yüklenemedi:", item.name, err);
                        onAssetLoad();
                    });
                });

                const assignRoles = () => {
                    const player = gameStateRef.current.player;
                    player.isPredator = false; // Oyuncu daima masum (hayatta kalmaya çalışıyor)
                    player.isProtector = false;
                    
                    const bots = [...gameStateRef.current.bots];
                    bots.sort(() => Math.random() - 0.5);
                    bots[0].isPredator = true; // Botlardan biri gizli katil
                    bots[1].isProtector = true;
                    
                    const newRoster = [player, ...bots].map((fish) => {
                        return { name: fish.fishName, isDead: false };
                    });
                    setRoster(newRoster);
                };

                let animationId;
                const startGameLoop = () => {
                    const animate = () => {
                        animationId = requestAnimationFrame(animate);
                        gameStateRef.current.time += 0.02;
                        const t = gameStateRef.current.time;
                        const { player, bots, solidObjects, keys } = gameStateRef.current;

                        // Zorluk seviyesine göre bot hızı
                        const botSpeeds = { 'Kolay': 0.05, 'Orta': 0.1, 'Zor': 0.2, 'İmkansız': 0.35 };
                        const currentBotSpeed = botSpeeds[difficulty];

                        if (player && !player.isDead && !gameOver) {
                            const speed = 0.4;
                            let moveX = 0, moveZ = 0;
                            if (keys['w']) moveZ -= speed;
                            if (keys['s']) moveZ += speed;
                            if (keys['a']) moveX -= speed;
                            if (keys['d']) moveX += speed;

                            const checkCollision = (newX, newZ) => {
                                for (let obj of solidObjects) {
                                    if (obj.isFloor) continue; 
                                    const radius = obj.collisionRadius || 0; 
                                    if (radius === 0) continue;
                                    const dist = Math.sqrt(Math.pow(newX - obj.position.x, 2) + Math.pow(newZ - obj.position.z, 2));
                                    if (dist < radius) return true;
                                }
                                return false;
                            };

                            if (!checkCollision(player.position.x + moveX, player.position.z)) player.position.x += moveX;
                            if (!checkCollision(player.position.x, player.position.z + moveZ)) player.position.z += moveZ;

                            player.position.y = 3 + Math.sin(t * 1.5) * 0.4; 
                            if (moveX !== 0 || moveZ !== 0) {
                                player.rotation.y = Math.atan2(moveX, moveZ);
                            }

                            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 15, player.position.z + 25), 0.1);
                            camera.lookAt(player.position);
                        }

                        bots.forEach(bot => {
                            if (!bot.isDead && !gameOver) {
                                bot.directionTimer++;
                                
                                if (bot.directionTimer > 100) {
                                    bot.direction += (Math.random() - 0.5) * 1.5;
                                    bot.directionTimer = 0;
                                }

                                // Eğer bot katilse, oyuncuya doğru yüzsün
                                if (bot.isPredator) {
                                    const dx = player.position.x - bot.position.x;
                                    const dz = player.position.z - bot.position.z;
                                    bot.direction = Math.atan2(dx, dz);
                                }

                                const moveX = Math.sin(bot.direction) * currentBotSpeed;
                                const moveZ = Math.cos(bot.direction) * currentBotSpeed;

                                let blocked = false;
                                for (let obj of solidObjects) {
                                    if (obj.isFloor || (obj.collisionRadius || 0) === 0) continue;
                                    const dist = Math.sqrt(Math.pow((bot.position.x + moveX) - obj.position.x, 2) + Math.pow((bot.position.z + moveZ) - obj.position.z, 2));
                                    if (dist < obj.collisionRadius) {
                                        blocked = true;
                                        break;
                                    }
                                }

                                if (!blocked) {
                                    bot.position.x += moveX;
                                    bot.position.z += moveZ;
                                } else {
                                    bot.direction += Math.PI / 2; 
                                }

                                if (Math.abs(bot.position.x) > 70 || Math.abs(bot.position.z) > 70) {
                                    bot.direction += Math.PI;
                                }

                                bot.position.y = 3 + Math.sin(t * 1.5 + bot.position.x) * 0.4;
                                bot.rotation.y = bot.direction;

                                // Katil oyuncuya yaklaşırsa oyun biter
                                if (bot.isPredator) {
                                    const distToPlayer = Math.sqrt(Math.pow(bot.position.x - player.position.x, 2) + Math.pow(bot.position.z - player.position.z, 2));
                                    if (distToPlayer < 5) { // Öldürme mesafesi
                                        player.isDead = true;
                                        setIsDead(true);
                                        setGameOver(true);
                                        setWinner("Katil Kazandı!");
                                    }
                                }
                            }
                        });

                        renderer.render(scene, camera);
                    };
                    animate();
                };

                const handleKeyDown = (e) => {
                    gameStateRef.current.keys[e.key.toLowerCase()] = true;
                    if (e.key.toLowerCase() === 'r') setShowRoster(prev => !prev);
                };
                const handleKeyUp = (e) => { gameStateRef.current.keys[e.key.toLowerCase()] = false; };
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                    window.removeEventListener('resize', handleResize);
                    mountRef.current.removeChild(renderer.domElement);
                };
            }, [gameStarted, difficulty, gameOver]);

            useEffect(() => {
                if (gameStarted && timer > 0 && !gameOver) {
                    const interval = setInterval(() => {
                        setTimer(prev => {
                            if (prev <= 1) {
                                setGameOver(true);
                                setWinner("Masumlar Kazandı! (Süre Doldu)");
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [gameStarted, timer, gameOver]);

            return (
                <div>
                    {loading && gameStarted && !gameOver && (
                        <div className="absolute top-0 left-0 w-full h-full flex items-center justify-center bg-slate-900 text-white text-2xl z-50">
                            <div className="animate-pulse">Harita ve Balıklar Yükleniyor...</div>
                        </div>
                    )}
                    
                    {gameOver && (
                        <div className="absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center bg-slate-900/90 text-white z-50">
                            <h1 className="text-6xl font-bold mb-8 text-cyan-400">{winner}</h1>
                            <button 
                                className="bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-8 rounded-full text-xl transition-all"
                                onClick={() => window.location.reload()}
                            >
                                Tekrar Oyna
                            </button>
                        </div>
                    )}

                    {!gameStarted && !gameOver ? (
                        <div className="absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center bg-slate-900 text-white z-50">
                            <h1 className="text-5xl font-bold mb-8 text-cyan-400">Deep Sea Mystery</h1>
                            
                            <div className="mb-6">
                                <p className="text-center mb-2 text-slate-300">Zorluk Seviyesi</p>
                                <div className="flex gap-2">
                                    {['Kolay', 'Orta', 'Zor', 'İmkansız'].map(diff => (
                                        <button 
                                            key={diff}
                                            className={`px-4 py-2 rounded-lg font-bold ${difficulty === diff ? 'bg-cyan-500' : 'bg-slate-700 hover:bg-slate-600'}`}
                                            onClick={() => setDifficulty(diff)}
                                        >
                                            {diff}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="mb-8">
                                <p className="text-center mb-2 text-slate-300">Oyun Süresi</p>
                                <div className="flex gap-2">
                                    {[60, 120, 180, 300].map(time => (
                                        <button 
                                            key={time}
                                            className={`px-4 py-2 rounded-lg font-bold ${gameDuration === time ? 'bg-cyan-500' : 'bg-slate-700 hover:bg-slate-600'}`}
                                            onClick={() => setGameDuration(time)}
                                        >
                                            {time}s
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button 
                                className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-12 rounded-full text-2xl transition-all"
                                onClick={() => { setTimer(gameDuration); setGameStarted(true); }}
                            >
                                Oyna
                            </button>
                            <p className="mt-4 text-slate-400">WASD ile yüzin, R ile listeyi açın. Katil balıktan kaçın!</p>
                        </div>
                    ) : (
                        <>
                            <div ref={mountRef} className="absolute top-0 left-0 w-full h-full"></div>
                            <div className="ui-overlay">
                                <div className="absolute top-4 left-1/2 transform -translate-x-1/2 bg-black/50 text-white px-6 py-2 rounded-full text-2xl font-bold">
                                    {timer}s
                                </div>
                                
                                {showRoster && !gameOver && (
                                    <div className="absolute top-4 right-4 bg-black/50 text-white p-4 rounded-lg w-64">
                                        <h2 className="font-bold mb-2 border-b border-slate-600 pb-1">Balıklar (R)</h2>
                                        <ul>
                                            {roster.map((fish, i) => (
                                                <li key={i} className={`flex justify-between ${fish.isDead ? 'text-red-500 line-through' : 'text-green-400'}`}>
                                                    <span>{fish.name}</span>
                                                    <span className="text-xs opacity-70">{fish.isDead ? "Ölü" : "Hayatta"}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
