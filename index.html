<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Sea Mystery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: url('textures/bg1.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Arial', sans-serif; 
        }
        canvas { display: block; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [gameStarted, setGameStarted] = useState(false);
            const [isDead, setIsDead] = useState(false);
            const [timer, setTimer] = useState(60);
            const [showRoster, setShowRoster] = useState(true);
            const [loading, setLoading] = useState(true);
            const [loadProgress, setLoadProgress] = useState(0);
            const [roster, setRoster] = useState([]);
            const [difficulty, setDifficulty] = useState('Orta');
            const [gameDuration, setGameDuration] = useState(60);
            const [gameOver, setGameOver] = useState(false);
            const [winner, setWinner] = useState('');
            
            const mountRef = useRef(null);
            const gameStateRef = useRef({
                scene: null, camera: null, renderer: null,
                player: null, bots: [], solidObjects: [],
                keys: {}, time: 0
            });

            // Ref'ler (Game loop'un içinde anlık değerleri okumak için)
            const gameOverRef = useRef(false);
            const difficultyRef = useRef(difficulty);

            useEffect(() => { gameOverRef.current = gameOver; }, [gameOver]);
            useEffect(() => { difficultyRef.current = difficulty; }, [difficulty]);

            useEffect(() => {
                if (!gameStarted) return;

                const scene = new THREE.Scene();
                // Fog rengi bg1.jpg'nin ortalama tonuyla eşleşecek şekilde ayarlandı (#2d687b),
                // önceki koyu lacivert (#1a3a5a) resimle net bir "dikiş" oluşturuyordu.
                scene.fog = new THREE.Fog(0x2d687b, 60, 200);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.setClearColor(0x000000, 0); 
                mountRef.current.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x6080a0, 1.2); 
                scene.add(ambientLight);
                
                const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
                sunLight.position.set(20, 50, 20);
                sunLight.castShadow = true;
                scene.add(sunLight);

                // Odalar arasındaki boşlukta hiç zemin yoktu (versiyon 2'de zemin tamamen
                // kaldırılmış), yani oyuncu geçişlerde koyu bir boşlukta yüzüyor gibi görünüyordu.
                // Bütün alanı kaplayan alçak bir zemin geri eklendi — rengi artık kaki/sarı değil,
                // bg1.jpg'nin kendi kumsal bölgesinden örneklenen gri-mavi ton (#7b8389),
                // fotoğrafla çok daha doğal karışıyor.
                const floorGeo = new THREE.PlaneGeometry(240, 240);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x7b8389, roughness: 1 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = -0.1;
                floor.receiveShadow = true;
                floor.isFloor = true;
                scene.add(floor);
                gameStateRef.current.solidObjects.push(floor);

                const loader = new THREE.GLTFLoader();

                // Oda duvarları için gerçek üçgen-bazlı çarpışma: dairesel collision bir
                // odanın karmaşık şeklini (kapı boşlukları dahil) temsil edemiyordu, bu yüzden
                // önceden radius:0 ile tüm oda çarpışması kapatılmıştı. Şimdi oda modellerinin
                // kendi mesh'lerine karşı ışın (ray) atarak gerçek duvarlara çarpma, boşluklardan
                // geçme sağlanıyor.
                const wallMeshes = [];
                const wallRaycaster = new THREE.Raycaster();
                
                const fishModels = [
                    { path: 'models/Sinfish.glb', name: 'Sinfish' },
                    { path: 'models/Ninfish_3D.glb', name: 'Ninfish' },
                    { path: 'models/Pinkfish.glb', name: 'Pinkfish' },
                    { path: 'models/Bugsyfish.glb', name: 'Bugsyfish' },
                    { path: 'models/Rozyfish.glb', name: 'Rozyfish' },
                    { path: 'models/Elifish.glb', name: 'Elifish' },
                    { path: 'models/Mirfish_3D.glb', name: 'Mirfish' }
                ];

                const envSpawnList = [
                    // NOT: dosya adları GitHub'a yüklediğin haliyle birebir eşleşiyor
                    // (coral_cave -> coral_rave, ship_hull.glb -> ship_hull.glb.glb).
                    // Ölçek 6'dan 18'e çıkarıldı: modellerin gerçek boyutu ~2x2x2 birime
                    // normalize edilmiş, yani scale:6 ile oda sadece 12 birim genişliğindeydi
                    // ama aralarında 40-45 birim mesafe vardı - odalar küçük kutucuklar halinde
                    // koca bir boşlukta yüzüyordu. scale:18 ile odalar ~36 birim genişliğinde
                    // olup birbirine çok daha yakın duracak. Gözle kontrol edip ince ayar yap.
                    { name: 'temple_room.glb', x: 0, z: 0, scale: 18, radius: 0 },
                    { name: 'ship_hull.glb.glb', x: -40, z: 15, scale: 18, radius: 0 },
                    { name: 'coral_rave.glb', x: 40, z: 15, scale: 18, radius: 0 },
                    { name: 'submarine_section.glb', x: 0, z: -45, scale: 18, radius: 0 },
                    
                    { name: 'treasure_chest.glb', x: 5, z: 5, scale: 3, radius: 4 },
                    { name: 'treasure_chest.glb', x: -35, z: 20, scale: 3, radius: 4 },
                    { name: 'diving_mask.glb', x: -5, z: -5, scale: 2, radius: 2 },
                    { name: 'skeleton.glb', x: 35, z: 5, scale: 3, radius: 4 },
                    { name: 'giant_kelp.glb', x: 15, z: -25, scale: 4, radius: 2 },
                    { name: 'giant_kelp.glb', x: -15, z: -25, scale: 4, radius: 2 },
                    { name: 'coral_reef.glb', x: 50, z: -20, scale: 4, radius: 5 },
                    { name: 'coral_reef.glb', x: -50, z: -20, scale: 4, radius: 5 },
                    { name: 'coral_tube.glb', x: 25, z: 35, scale: 4, radius: 4 },
                    { name: 'coral_tube.glb', x: -25, z: 35, scale: 4, radius: 4 }
                ];

                let totalToLoad = fishModels.length + envSpawnList.length;
                let currentLoaded = 0;

                const onAssetLoad = () => {
                    currentLoaded++;
                    setLoadProgress(Math.round((currentLoaded / totalToLoad) * 100));
                    if (currentLoaded === totalToLoad) {
                        setLoading(false);
                        assignRoles();
                        startGameLoop();
                    }
                };

                const createFish = (model, isPlayer, fishName) => {
                    model.scale.set(3, 3, 3);
                    
                    // DOĞMA NOKTALARI DÜZELTİLDİ (Artık üst üste doğmuyorlar)
                    if (isPlayer) {
                        model.position.set(0, 3, 40); // Oyuncu Kuzey'de doğar
                    } else {
                        // Botlar Güney ve kenarlarda rastgele doğar
                        model.position.set((Math.random() - 0.5) * 80, 3, (Math.random() - 0.5) * 60 - 30);
                    }

                    model.isDead = false; 
                    model.isPredator = false;
                    model.isProtector = false;
                    model.fishName = fishName;
                    
                    if (!isPlayer) {
                        model.direction = Math.random() * Math.PI * 2;
                        model.directionTimer = 0;
                    }
                    
                    model.traverse(child => { if (child.isMesh) { child.castShadow = true; } });
                    
                    if (isPlayer) gameStateRef.current.player = model;
                    else gameStateRef.current.bots.push(model);
                    scene.add(model);
                };

                fishModels.forEach((fishData, index) => {
                    loader.load(fishData.path, (gltf) => {
                        createFish(gltf.scene, index === 0, fishData.name);
                        onAssetLoad();
                    }, undefined, (err) => {
                        console.error("Balık modeli yüklenemedi:", fishData.path, err);
                        const boxGeo = new THREE.BoxGeometry(2, 1, 3);
                        const boxMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
                        createFish(new THREE.Mesh(boxGeo, boxMat), index === 0, fishData.name + " (Hata!)");
                        onAssetLoad();
                    });
                });

                envSpawnList.forEach(item => {
                    loader.load(`models/environment/${item.name}`, (gltf) => {
                        const model = gltf.scene;
                        model.position.set(item.x, 0, item.z);
                        model.scale.set(item.scale, item.scale, item.scale);
                        model.isFloor = false;
                        model.collisionRadius = item.radius;
                        model.traverse(child => { 
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                                // radius:0 olan girişler (oda modelleri) gerçek duvar çarpışması
                                // için mesh listesine ekleniyor — dairesel collision yerine
                                // ışın atarak gerçek geometriye (kapı boşlukları dahil) bakılıyor.
                                if (item.radius === 0) wallMeshes.push(child);
                            }
                        });
                        scene.add(model);
                        gameStateRef.current.solidObjects.push(model);
                        onAssetLoad();
                    }, undefined, (err) => {
                        console.error("Ortam modeli yüklenemedi:", item.name, err);
                        onAssetLoad();
                    });
                });

                const assignRoles = () => {
                    const player = gameStateRef.current.player;
                    player.isPredator = false;
                    player.isProtector = false;
                    
                    const bots = [...gameStateRef.current.bots];
                    bots.sort(() => Math.random() - 0.5);
                    bots[0].isPredator = true; // Gizli Katil
                    bots[1].isProtector = true; // Şerif
                    
                    const newRoster = [player, ...bots].map((fish) => {
                        return { name: fish.fishName, isDead: false };
                    });
                    setRoster(newRoster);
                };

                let animationId;
                const startGameLoop = () => {
                    const animate = () => {
                        animationId = requestAnimationFrame(animate);
                        gameStateRef.current.time += 0.02;
                        const t = gameStateRef.current.time;
                        const { player, bots, solidObjects, keys } = gameStateRef.current;

                        // Zorluk artık sadece katilin hızını etkiliyor — önceden tüm balıkları
                        // aynı oranda hızlandırıyordu, bu da "zor" modu katili değil genel
                        // kalabalığı daha kaotik yapıyordu.
                        const predatorSpeeds = { 'Kolay': 0.09, 'Orta': 0.14, 'Zor': 0.22, 'İmkansız': 0.32 };
                        const ambientSpeed = 0.08;

                        if (player && !player.isDead && !gameOverRef.current) {
                            const speed = 0.4;
                            let moveX = 0, moveZ = 0;
                            if (keys['w']) moveZ -= speed;
                            if (keys['s']) moveZ += speed;
                            if (keys['a']) moveX -= speed;
                            if (keys['d']) moveX += speed;

                            const checkCollision = (newX, newZ) => {
                                for (let obj of solidObjects) {
                                    if (obj.isFloor) continue; 
                                    const radius = obj.collisionRadius || 0; 
                                    if (radius === 0) continue;
                                    const dist = Math.sqrt(Math.pow(newX - obj.position.x, 2) + Math.pow(newZ - obj.position.z, 2));
                                    if (dist < radius) return true;
                                }
                                // Oda duvarları: gerçek geometriye ışın atarak kontrol et,
                                // böylece sadece kapı/delik olan yerlerden geçilebiliyor.
                                if (wallMeshes.length > 0) {
                                    const dx = newX - player.position.x;
                                    const dz = newZ - player.position.z;
                                    const dist = Math.sqrt(dx * dx + dz * dz);
                                    if (dist > 0.0001) {
                                        wallRaycaster.set(
                                            new THREE.Vector3(player.position.x, player.position.y, player.position.z),
                                            new THREE.Vector3(dx, 0, dz).normalize()
                                        );
                                        wallRaycaster.far = dist + 0.4;
                                        if (wallRaycaster.intersectObjects(wallMeshes, false).length > 0) return true;
                                    }
                                }
                                return false;
                            };

                            if (!checkCollision(player.position.x + moveX, player.position.z)) player.position.x += moveX;
                            if (!checkCollision(player.position.x, player.position.z + moveZ)) player.position.z += moveZ;

                            player.position.y = 3 + Math.sin(t * 1.5) * 0.4; 
                            if (moveX !== 0 || moveZ !== 0) {
                                player.rotation.y = Math.atan2(moveX, moveZ);
                            }

                            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 15, player.position.z + 25), 0.1);
                            camera.lookAt(player.position);
                        }

                        bots.forEach(bot => {
                            if (!bot.isDead && !gameOverRef.current) {
                                bot.directionTimer++;
                                
                                if (bot.directionTimer > 100) {
                                    bot.direction += (Math.random() - 0.5) * 1.5;
                                    bot.directionTimer = 0;
                                }

                                // KATİL YAPAY ZEKASI (Sadece yakınsa takip eder)
                                if (bot.isPredator) {
                                    const dx = player.position.x - bot.position.x;
                                    const dz = player.position.z - bot.position.z;
                                    const distToPlayer = Math.sqrt(dx * dx + dz * dz);
                                    
                                    if (distToPlayer < 40) { // Görüş mesafesi 40 birim
                                        bot.direction = Math.atan2(dx, dz); // Takip et
                                    }
                                }

                                const currentBotSpeed = bot.isPredator ? predatorSpeeds[difficultyRef.current] : ambientSpeed;
                                const moveX = Math.sin(bot.direction) * currentBotSpeed;
                                const moveZ = Math.cos(bot.direction) * currentBotSpeed;

                                let blocked = false;
                                for (let obj of solidObjects) {
                                    if (obj.isFloor || (obj.collisionRadius || 0) === 0) continue;
                                    const dist = Math.sqrt(Math.pow((bot.position.x + moveX) - obj.position.x, 2) + Math.pow((bot.position.z + moveZ) - obj.position.z, 2));
                                    if (dist < obj.collisionRadius) {
                                        blocked = true;
                                        break;
                                    }
                                }

                                if (!blocked && wallMeshes.length > 0) {
                                    const stepDist = Math.sqrt(moveX * moveX + moveZ * moveZ);
                                    if (stepDist > 0.0001) {
                                        wallRaycaster.set(
                                            new THREE.Vector3(bot.position.x, bot.position.y, bot.position.z),
                                            new THREE.Vector3(moveX, 0, moveZ).normalize()
                                        );
                                        wallRaycaster.far = stepDist + 0.4;
                                        if (wallRaycaster.intersectObjects(wallMeshes, false).length > 0) blocked = true;
                                    }
                                }

                                if (!blocked) {
                                    bot.position.x += moveX;
                                    bot.position.z += moveZ;
                                } else {
                                    bot.direction += Math.PI / 2; 
                                }

                                if (Math.abs(bot.position.x) > 70 || Math.abs(bot.position.z) > 70) {
                                    bot.direction += Math.PI;
                                }

                                bot.position.y = 3 + Math.sin(t * 1.5 + bot.position.x) * 0.4;
                                bot.rotation.y = bot.direction;

                                // ÖLDÜRME KOŞULU
                                if (bot.isPredator) {
                                    const distToPlayer = Math.sqrt(Math.pow(bot.position.x - player.position.x, 2) + Math.pow(bot.position.z - player.position.z, 2));
                                    if (distToPlayer < 5 && !player.isDead) { 
                                        player.isDead = true;
                                        setIsDead(true);
                                        setGameOver(true);
                                        setWinner("Katil Kazandı!");
                                    }
                                }
                            }
                        });

                        renderer.render(scene, camera);
                    };
                    animate();
                };

                const handleKeyDown = (e) => {
                    gameStateRef.current.keys[e.key.toLowerCase()] = true;
                    if (e.key.toLowerCase() === 'r') setShowRoster(prev => !prev);
                };
                const handleKeyUp = (e) => { gameStateRef.current.keys[e.key.toLowerCase()] = false; };
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                    window.removeEventListener('resize', handleResize);
                    if (mountRef.current) {
                        mountRef.current.removeChild(renderer.domElement);
                    }
                };
            }, [gameStarted]); // Sadece gameStarted değişince çalışır

            useEffect(() => {
                if (gameStarted && timer > 0 && !gameOver) {
                    const interval = setInterval(() => {
                        setTimer(prev => {
                            if (prev <= 1) {
                                setGameOver(true);
                                setWinner("Masumlar Kazandı! (Süre Doldu)");
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [gameStarted, timer, gameOver]);

            return (
                <div>
                    {loading && gameStarted && !gameOver && (
                        <div className="absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center bg-slate-900 text-white text-2xl z-50">
                            <div className="mb-4">Harita ve Balıklar Yükleniyor... %{loadProgress}</div>
                            <div className="w-64 h-3 bg-slate-700 rounded-full overflow-hidden">
                                <div
                                    className="h-full bg-cyan-400 transition-all duration-200"
                                    style={{ width: `${loadProgress}%` }}
                                ></div>
                            </div>
                        </div>
                    )}
                    
                    {gameOver && (
                        <div className="absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center bg-slate-900/90 text-white z-50">
                            <h1 className="text-6xl font-bold mb-8 text-cyan-400">{winner}</h1>
                            <button 
                                className="bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-8 rounded-full text-xl transition-all"
                                onClick={() => window.location.reload()}
                            >
                                Tekrar Oyna
                            </button>
                        </div>
                    )}

                    {!gameStarted && !gameOver ? (
                        <div className="absolute top-0 left-0 w-full h-full flex flex-col items-center justify-center bg-slate-900 text-white z-50">
                            <h1 className="text-5xl font-bold mb-8 text-cyan-400">Deep Sea Mystery</h1>
                            
                            <div className="mb-6">
                                <p className="text-center mb-2 text-slate-300">Zorluk Seviyesi</p>
                                <div className="flex gap-2">
                                    {['Kolay', 'Orta', 'Zor', 'İmkansız'].map(diff => (
                                        <button 
                                            key={diff}
                                            className={`px-4 py-2 rounded-lg font-bold ${difficulty === diff ? 'bg-cyan-500' : 'bg-slate-700 hover:bg-slate-600'}`}
                                            onClick={() => setDifficulty(diff)}
                                        >
                                            {diff}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="mb-8">
                                <p className="text-center mb-2 text-slate-300">Oyun Süresi</p>
                                <div className="flex gap-2">
                                    {[60, 120, 180, 300].map(time => (
                                        <button 
                                            key={time}
                                            className={`px-4 py-2 rounded-lg font-bold ${gameDuration === time ? 'bg-cyan-500' : 'bg-slate-700 hover:bg-slate-600'}`}
                                            onClick={() => setGameDuration(time)}
                                        >
                                            {time}s
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button 
                                className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-12 rounded-full text-2xl transition-all"
                                onClick={() => { setTimer(gameDuration); setGameStarted(true); }}
                            >
                                Oyna
                            </button>
                            <p className="mt-4 text-slate-400">WASD ile yüzin, R ile listeyi açın. Katil balıktan kaçın!</p>
                        </div>
                    ) : (
                        <>
                            <div ref={mountRef} className="absolute top-0 left-0 w-full h-full"></div>
                            <div className="ui-overlay">
                                <div className="absolute top-4 left-1/2 transform -translate-x-1/2 bg-black/50 text-white px-6 py-2 rounded-full text-2xl font-bold">
                                    {timer}s
                                </div>
                                
                                {showRoster && !gameOver && (
                                    <div className="absolute top-4 right-4 bg-black/50 text-white p-4 rounded-lg w-64">
                                        <h2 className="font-bold mb-2 border-b border-slate-600 pb-1">Balıklar (R)</h2>
                                        <ul>
                                            {roster.map((fish, i) => (
                                                <li key={i} className={`flex justify-between ${fish.isDead ? 'text-red-500 line-through' : 'text-green-400'}`}>
                                                    <span>{fish.name}</span>
                                                    <span className="text-xs opacity-70">{fish.isDead ? "Ölü" : "Hayatta"}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
